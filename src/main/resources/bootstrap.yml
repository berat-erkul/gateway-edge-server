spring:
  profiles:
    active: default
  cloud:
    config:
      name: gateway-service
      uri: ${CENTRAL_CONFIG_SERVER_URI :http://localhost:8888}
      fail-fast: true
      retry:
        max-attempts: 10
        max-interval: 2000
    vault:
      enabled: false
      fail-fast: false
      host: localhost
      port: 8200
      scheme: http
      authentication: APPROLE
      app-role:
        role-id: ${VAULT_ROLE_ID}
        secret-id: ${VAULT_SECRET_ID}
      kv:
        enabled: true
        backend: kv
        default-context: ticketing
        profile-separator: '/'

keycloak:
  address: ${KEYCLOAK_ADDRESS}
